# Base configuration for the Intraday Strategy Research Lab.
#
# Precedence (lowest to highest):
#   config/default.yaml  <  config/env/<environment>.yaml  <  LAB__ env vars
#
# This is the single source of truth for tunable parameters (Part I §2).
# NO SECRETS here — API keys/tokens come only from the environment or an
# untracked .env file, never from versioned config.

environment: dev

logging:
  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: INFO
  # console (human-readable) | json (machine-parseable)
  renderer: console
  # Extra key substrings to redact, ADDED to the built-in security set
  # (config can strengthen redaction, never weaken it).
  redact_keys: []

# Layer-1 feature/indicator parameters (single source of truth; loaded into
# FeatureConfig). Phase-3 study specs pin these per strategy.
features:
  sma_period: 20
  ema_period: 20
  kama_period: 10
  rsi_period: 14
  adx_period: 14
  atr_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_num_std: 2.0
  donchian_period: 20
  relative_volume_period: 20
  realized_vol_period: 20
  opening_range_minutes: 15
  di_period: 14
  parkinson_period: 20
  garman_klass_period: 20
  atr_band_num: 2.0
  momentum_period: 10
  pullback_period: 20
  swing_window: 3
  trend_fast: 10
  trend_slow: 30

# Sharpe convention (Part III Layer 2): annualization is by each strategy's REALIZED
# frequency — its ACTUAL trades per operating year, computed per study from the backtest
# (lab.research.validation.sharpe.realized_periods_per_year) — NOT a pinned calendar
# constant. The former fixed `sharpe.periods_per_year: 18750` (all 5-min bars/year)
# over-annualized any strategy that did not trade on ~every bar; it was removed so a
# few-hundred-trades-a-year strategy and a near-every-bar one are each scaled on their
# true trade rate and stay comparable.

calendar:
  # IANA timezone the exchange operates in. Every timestamp and log line is IST.
  timezone: "Asia/Kolkata"

  session:
    # NSE cash-equity session boundaries, IST. Always quote times as "HH:MM" —
    # unquoted values are misread by YAML as base-60 integers.
    pre_open_start: "09:00"   # pre-open auction begins
    open: "09:15"             # continuous (regular) session opens
    close: "15:30"            # continuous session closes
    square_off: "15:20"       # Zerodha MIS intraday auto-square-off cutoff
    post_close_start: "15:40" # post-close (closing) session begins
    post_close_end: "16:00"   # post-close session ends

  # NSE trading holidays on which the regular session is closed (IST). Weekends
  # are structural and not listed. NSE and BSE share the same equity holidays, so
  # this list is GENERATED from the maintained exchange_calendars XBOM calendar
  # (weekday non-sessions) — see scripts/generate_nse_holidays.py — rather than
  # hand-typed, which also captures special/ad-hoc holidays (e.g. election days).
  # Diwali Muhurat days are treated as holidays for the regular daytime session.
  # Regenerate to extend the range as the backfill window grows.
