# THE seven-point kill-gate — every threshold a single PRE-COMMITTED number.
#
# Never a range, never adjusted to rescue a result (Part III Layer 2, Inviolable
# Rule 1). Changing any threshold here invalidates every prior verdict and
# re-runs the slate. Fail any one criterion -> the strategy is KILLed.

# (1) CPCV median path-Sharpe, net of costs, on the fixed Sharpe convention.
cpcv_median_path_sharpe_min: 1.0

# (2) Deflated Sharpe Ratio vs the live EFFECTIVE (cluster-adjusted) trial count.
dsr_min: 0.95

# (3) Probability of Backtest Overfitting via CSCV.
pbo_max: 0.20

# (4) Narrow, positive CPCV distribution (BOTH must hold).
cpcv_positive_paths_fraction_min: 0.90   # >= 90% of reconstructed paths positive
cpcv_10th_percentile_sharpe_min: 0.0     # 10th-percentile path-Sharpe >= 0

# (5) P&L not concentrated (ALL three must hold).
profit_factor_min: 1.3                   # gross profit / gross loss
top5_winners_fraction_max: 0.40          # top-5 winning trades < 40% of gross profit
require_expectancy_over_cost: true       # net per-trade expectancy > 0 (gross edge exceeds round-trip cost, counted once)

# (6) Robustness battery — each sub-test with a pinned pass bar.
robustness:
  param_sensitivity_net_sharpe_min: 0.5  # net Sharpe > 0.5 across ±1 config step of every param
  mc_shuffle_beat_fraction_min: 0.95     # real net Sharpe beats >= 95% of trade-shuffles
  cross_symbol_positive_fraction_min: 0.5  # net-positive on a majority of held-out symbols
  two_engine_tolerance: 0.05             # vectorized vs event-driven agree within this Sharpe tol
  # noise injection is pass/fail: the edge must survive realistic OHLC perturbation.

# (7) Edge stable across pre-defined regimes (buckets fixed before running).
regime:
  median_path_sharpe_min_every_bucket: 0.0   # > 0 in EVERY bucket
  median_path_sharpe_majority_min: 0.5       # > 0.5 in a majority of buckets
  require_positive_without_best_bucket: true # net-positive with the single best bucket removed

# Stub guard (Phase-3 readiness B-1): STRUCTURAL evidence floors, never value
# thresholds. The gate returns INSUFFICIENT (not PASS/KILL) when a criterion's
# input arrives under-shaped — a stub rather than a genuinely computed value.
# Kept permissive: the guard only rejects stubs; criterion 7's own ">0 in every
# bucket" enforces statistical adequacy, so these must not do its job.
evidence:
  min_regime_buckets: 4    # criterion 7 needs >= this many distinct populated regime buckets
  min_cross_symbols: 3     # criterion 6d needs >= this many distinct held-out symbols
  min_cpcv_paths: 8        # criteria 1/4 need >= this many FINITE (post-purge) CPCV paths
  min_base_observations: 30  # a study's base config needs >= this many trades to be certified;
                             # below it the realized-frequency Sharpe (len(trades)/span) and the
                             # CPCV path distribution are dominated by a handful of possibly-lucky
                             # trades -> INSUFFICIENT, never graded. Far below any genuinely-trading
                             # strategy over the multi-year span (even one trade/week ~ 570 trades),
                             # so it rejects only degenerate configs; it also turns CPCV's "need
                             # >= n_groups observations" from a crash into a clean refusal.

# Panel scope (Phase 3, per-symbol-then-aggregate). A panel study's verdict has TWO
# parts, BOTH required: (1) the equal-weight panel-PORTFOLIO daily return stream clears
# the seven criteria above (scored on the aggregate stream, realized-frequency ~252/yr);
# (2) breadth across the panel symbols. These pin part (2), the panel-adapted robustness
# fractions (criterion 6 aggregated across the panel), and the structural floors. Frozen
# like every threshold here -- pre-committed, never tuned to rescue a study.
panel:
  # (2) breadth -- BOTH must hold
  breadth_median_path_sharpe_min: 1.0     # median across panel symbols of each symbol's CPCV median path-Sharpe > this
  breadth_positive_fraction_min: 0.60     # >= this fraction of panel symbols individually positive
  # 0.60 not 0.70: the frozen-49 are correlated large-caps, so a real edge misses on
  # choppy/correlated laggards; 0.70 risks a false-KILL, 0.60 is a real majority without
  # demanding near-unanimity.
  # criterion 6 aggregated across the panel symbols (fractions, pre-committed)
  noise_survives_fraction_min: 0.60       # >= this fraction of panel symbols survive OHLC-noise injection
  two_engine_reconcile_fraction_min: 1.0  # ALL panel symbols must reconcile across the two engines
  # structural floors -> INSUFFICIENT (not KILL) when the panel is too thin to certify
  min_panel_symbols: 6                    # fewer scored panel symbols than this -> cannot certify a panel
  min_portfolio_days: 250                 # fewer aggregate portfolio days than this (< ~1 year) -> cannot certify
